<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wedding Celebration</title>
    <link rel="stylesheet" href="invitation.css">
    <script src="audioManager.js"></script>
</head>
<body>

    <nav class="top-nav" id="topNavbar">
        <a href="index.html" class="logo-link">
            <img src="png/logo.png" alt="Wedding Logo" id="navLogo" class="nav-logo">
        </a>
    </nav>

    <div class="scroll-wrapper">
        
        <section id="heroSection" class="hero-container">
            <div id="heroContent" class="hero-content luxury-card">
                
                <header class="content-header">
                    <h2 class="section-subtitle">A Promise for a Lifetime</h2>
                </header>

                <div class="countdown-section">
                    <h3 class="countdown-title">COUNTDOWN TO OUR DAY</h3>
                    
                    <div id="countdownClock" class="clock-display">
                        <div class="time-block">
                            <span id="days" class="time-number">00</span>
                            <span class="time-label">Days</span>
                        </div>
                        <div class="time-block">
                            <span id="hours" class="time-number">00</span>
                            <span class="time-label">Hours</span>
                        </div>
                        <div class="time-block">
                            <span id="minutes" class="time-number">00</span>
                            <span class="time-label">Minutes</span>
                        </div>
                        <div class="time-block">
                            <span id="seconds" class="time-number">00</span>
                            <span class="time-label">Seconds</span>
                        </div>
                    </div>
                </div>

                <div class="scroll-notice">
                    <span class="scroll-text">Scroll to View Invitation</span>
                    <div class="scroll-line"></div>
                </div>
            </div>
        </section>

        <section id="curtainSection" class="framed-details-section dynamic-reveal">
            
            <div class="booth-container reveal-element">
                
                <div class="booth-asset-header">
                    <img src="png/capturedmoments.png" alt="Captured Moments" class="captured-moments-title">
                </div>
                
                <div class="printer-machine">
                    <div class="printer-shine"></div>
                    <div class="printer-slot">
                        <div class="slot-shadow"></div>
                    </div>
                </div>

                <div class="strip-mask" id="stripMask">
                    <div class="photostrip" id="photostrip"></div>
                </div>

            </div>

        </section>

        <section class="polaroid-deck-container dynamic-reveal">
            
            <div class="polaroid-table reveal-element" id="polaroidTable">
                <div class="floating-photo f-card-1">
                    <img src="png/pic1.png" alt="Celebration 1">
                </div>
                <div class="floating-photo f-card-2">
                    <img src="png/pic2.png" alt="Celebration 2">
                </div>
                <div class="floating-photo f-card-3">
                    <img src="png/pic3.png" alt="Celebration 3">
                </div>
                <div class="floating-photo f-card-4">
                    <img src="png/pic4.png" alt="Celebration 4">
                </div>
                <div class="floating-photo f-card-5">
                    <img src="png/pic5.png" alt="Celebration 5">
                </div>
            </div>
        </section>

    </div>

    <button class="view-invitation-btn" id="openGalleryBtn">
        Click to View Invitation
    </button>

    <div class="lightbox-overlay" id="lightboxOverlay">
        <button class="lightbox-close" id="closeGalleryBtn">&times;</button>
        
        <div class="lightbox-window">
            <button class="lightbox-arrow left-arrow" id="prevPageBtn">&#8249;</button>
            
            <div class="lightbox-stage">
                <img src="png/page1.png" alt="Invitation Page" id="lightboxImage">
                <div class="page-indicator" id="pageIndicator">Page 1 of 4</div>
            </div>
            
            <button class="lightbox-arrow right-arrow" id="nextPageBtn">&#8250;</button>
        </div>
    </div>

    <script>
        /* ==========================================================================
           1. Global Interaction Triggers & Audio Activation
           ========================================================================== */
        function triggerAudioUnlock() {
            audioManager.init();
            window.removeEventListener('click', triggerAudioUnlock);
            window.removeEventListener('touchstart', triggerAudioUnlock);
            window.removeEventListener('scroll', triggerAudioUnlock);
        }

        window.addEventListener('click', triggerAudioUnlock);
        window.addEventListener('touchstart', triggerAudioUnlock);
        window.addEventListener('scroll', triggerAudioUnlock);

        if (window.location.search.includes('startAudio=true')) {
            triggerAudioUnlock();
        }

        /* ==========================================================================
           2. Visual Countdown Timer Logic Engine
           ========================================================================== */
        const targetEventDate = new Date("July 25, 2026 10:00:00").getTime();

        function updateCountdownClock() {
            const rightNow = new Date().getTime();
            const timeDifference = targetEventDate - rightNow;

            if (timeDifference > 0) {
                const totalSecs = Math.floor(timeDifference / 1000);
                const days = Math.floor(totalSecs / (60 * 60 * 24));
                const hours = Math.floor((totalSecs % (60 * 60 * 24)) / (60 * 60));
                const minutes = Math.floor((totalSecs % (60 * 60)) / 60);
                const seconds = totalSecs % 60;

                document.getElementById("days").innerText = String(days).padStart(2, '0');
                document.getElementById("hours").innerText = String(hours).padStart(2, '0');
                document.getElementById("minutes").innerText = String(minutes).padStart(2, '0');
                document.getElementById("seconds").innerText = String(seconds).padStart(2, '0');
            } else {
                clearInterval(clockIntervalEngine);
                document.getElementById("countdownClock").innerHTML = "<p class='event-started-msg'>THE CELEBRATION HAS BEGUN!</p>";
            }
        }

        updateCountdownClock();
        const clockIntervalEngine = setInterval(updateCountdownClock, 1000);

        /* ==========================================================================
           3. Viewport Transitions & Dynamic Nav Dismissal
           ========================================================================== */
        const logoElement = document.getElementById('navLogo');
        const topNavbar = document.getElementById('topNavbar');
        const curtainSection = document.getElementById('curtainSection');
        const heroContent = document.getElementById('heroContent');

        window.addEventListener('scroll', () => {
            const scrollValue = window.scrollY;
            const windowHeight = window.innerHeight;

            if (scrollValue <= windowHeight) {
                const fadePercentage = 1 - (scrollValue / (windowHeight * 0.7));
                const scalePercentage = 1 - (scrollValue / (windowHeight * 5));
                
                heroContent.style.opacity = Math.max(fadePercentage, 0);
                heroContent.style.transform = `scale(${Math.max(scalePercentage, 0.95)})`;
            }
        });

        const logoSwapObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    topNavbar.classList.add('nav-hidden-state');
                } else {
                    topNavbar.classList.remove('nav-hidden-state');
                }
            });
        }, { root: null, threshold: 0.05 });

        logoSwapObserver.observe(curtainSection);

        const revealTransitionObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('reveal-active');
                }
            });
        }, { root: null, threshold: 0.12 });

        document.querySelectorAll('.dynamic-reveal').forEach(section => {
            revealTransitionObserver.observe(section);
        });

        /* ==========================================================================
           4. Dynamic Photo Strip Generation (SKIPS 6 AND 7)
           ========================================================================== */
        const photostrip = document.getElementById('photostrip');
        const stripMask = document.getElementById('stripMask');
        const totalPhotos = 14; 
        
        let stripHTML = '';
        for (let i = 1; i <= totalPhotos; i++) {
            if (i === 6 || i === 7) {
                continue; 
            }
            stripHTML += `
                <div class="photo-frame">
                    <img src="photoBooth/p${i}.png" alt="Photobooth Image ${i}" loading="lazy">
                </div>
            `;
        }
        
        stripHTML += `
            <div class="strip-footer-tail">
                <div class="dashed-divider"></div>
                <div class="footer-text-wrap">
                    <p class="main-title">The Wedding of <br> Anne and Kim</p>
                </div>
            </div>
        `;
        photostrip.innerHTML = stripHTML;

        let hasPrinted = false;

        const printerObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting && !hasPrinted) {
                    hasPrinted = true; 
                    startMechanicalPrint();
                }
            });
        }, { root: null, threshold: 0.25 });

        printerObserver.observe(curtainSection);

        function startMechanicalPrint() {
            photostrip.classList.add('is-printing');

            try {
                audioManager.playInstant('paper', 0.8);
            } catch(e) {}

            setTimeout(() => {
                stripMask.style.overflowY = 'auto';
            }, 18000);
        }

        /* ==========================================================================
           5. Interactive 4-Page Lightbox Gallery Engine
           ========================================================================== */
        const pages = ['png/page1.png', 'png/page2.png', 'png/page3.png', 'png/page4.png'];
        let currentPageIndex = 0;

        const lightboxOverlay = document.getElementById('lightboxOverlay');
        const lightboxImage = document.getElementById('lightboxImage');
        const pageIndicator = document.getElementById('pageIndicator');
        
        const openGalleryBtn = document.getElementById('openGalleryBtn');
        const closeGalleryBtn = document.getElementById('closeGalleryBtn');
        const prevPageBtn = document.getElementById('prevPageBtn');
        const nextPageBtn = document.getElementById('nextPageBtn');

        function updateLightboxImage() {
            lightboxImage.style.opacity = '0';
            setTimeout(() => {
                lightboxImage.src = pages[currentPageIndex];
                pageIndicator.innerText = `Page ${currentPageIndex + 1} of 4`;
                lightboxImage.style.opacity = '1';
            }, 150);
        }

        openGalleryBtn.addEventListener('click', () => {
            currentPageIndex = 0; 
            updateLightboxImage();
            lightboxOverlay.classList.add('is-visible');
            document.body.style.overflow = 'hidden'; 
        });

        closeGalleryBtn.addEventListener('click', () => {
            lightboxOverlay.classList.remove('is-visible');
            document.body.style.overflow = ''; 
        });

        nextPageBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            currentPageIndex = (currentPageIndex + 1) % pages.length;
            updateLightboxImage();
        });

        prevPageBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            currentPageIndex = (currentPageIndex - 1 + pages.length) % pages.length;
            updateLightboxImage();
        });

        lightboxOverlay.addEventListener('click', (e) => {
            if (e.target === lightboxOverlay) {
                lightboxOverlay.classList.remove('is-visible');
                document.body.style.overflow = '';
            }
        });
    </script>
</body>
</html>
