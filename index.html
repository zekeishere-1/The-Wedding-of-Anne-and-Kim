<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <link rel="stylesheet" href="style.css">
    <script src="audioManager.js"></script>
</head>
<body>

    <div class="page-transition-overlay" id="fadeOverlay"></div>

    <main class="main-container">
        
        <h1 class="wedding-subtitle">WELCOME TO THE WEDDING OF</h1>
        
        <div class="names-container">
            <img src="png/anneandkim.png" alt="Anne & Kim" class="names-img">
        </div>
        
        <div class="envelope-container">
            <img 
                src="png/newEnvelope.png" 
                alt="Interactive Envelope" 
                id="interactiveEnvelope" 
                class="envelope-img"
                onclick="triggerTransition()"
            >
        </div>

        <p class="click-caption">CLICK ENVELOPE TO OPEN...</p>

    </main>

    <script>
        function triggerTransition() {
            // Unlocks and starts BeautifulSoul.mp3 instantly on envelope tap
            try {
                audioManager.init();
            } catch(e) {
                console.log("Audio contextual unlock waiting...");
            }

            const overlay = document.getElementById('fadeOverlay');
            overlay.classList.add('active');
            
            setTimeout(function() {
                // Pass startAudio flag to keep music running on invitation.html
                window.location.href = 'invitation.html?startAudio=true';
            }, 800); 
        }
    </script>
</body>
</html>
