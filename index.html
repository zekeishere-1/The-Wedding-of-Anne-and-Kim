<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Premium Page Transition Overlay -->
    <div class="page-transition-overlay" id="fadeOverlay"></div>

    <!-- Main Fluid Layout Container -->
    <main class="main-container">
        
        <!-- Welcome Subtitle -->
        <h1 class="wedding-subtitle">WELCOME TO THE WEDDING OF</h1>
        
        <!-- Celebrant Names Graphic -->
        <div class="names-container">
            <img src="png/anneandkim.png" alt="Anne & Kim" class="names-img">
        </div>
        
        <!-- Interactive Envelope Container -->
        <div class="envelope-container">
            <img 
                src="png/newEnvelope.png" 
                alt="Interactive Envelope" 
                id="interactiveEnvelope" 
                class="envelope-img"
                onclick="triggerTransition()"
            >
        </div>

        <!-- Instructional Caption -->
        <p class="click-caption">CLICK ENVELOPE TO OPEN...</p>

    </main>

    <script>
        function triggerTransition() {
            const overlay = document.getElementById('fadeOverlay');
            overlay.classList.add('active');
            setTimeout(function() {
                window.location.href = 'invitation.html';
            }, 800); 
        }
    </script>
</body>
</html>
